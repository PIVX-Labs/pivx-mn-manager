name: Lint

env:
  TAURI_DEPS: "libwebkit2gtk-4.1-dev \
    libsoup2.4-dev \
    build-essential \
    curl \
    wget \
    file \
    libssl-dev \
    libgtk-3-dev \
    libayatana-appindicator3-dev \
    librsvg2-dev"

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
      - LICENSE
      - "*.yaml"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "*.md"
      - LICENSE
      - "*.yaml"

jobs:
  run-linters-mpw:
    name: Build webapp
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run prettier
        run: npx prettier -l .

      - name: Run tests
        run: npm test
  run-linters-tauri:
    name: Run linters (Tauri)
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ""
      - name: Add jammy repo
        run: echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee /etc/apt/sources.list
      - name: Install tauri deps
        run: sudo apt update && sudo apt install $TAURI_DEPS

      - name: Run tests
        run: cd ./src-tauri && cargo test

      - name: Check formatting
        run: cd ./src-tauri && cargo fmt --check

  build-tauri:
    name: Build tauri
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install Node.js dependencies
        run: npm ci

      - name: Add jammy repo
        run: echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee /etc/apt/sources.list

      - name: Install tauri deps
        run: sudo apt update && sudo apt install $TAURI_DEPS

      - name: Build webapp
        run: npm run build

      - name: Build tauri
        run: npm run tauri build
      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles
          path: src-tauri/target/release/bundle/
